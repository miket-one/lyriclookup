<!doctype html>
<html>
  <head>
    <title>lyriclookup</title>
  </head>
  <body>
    <h1>lyriclookup</h1>
    <p>Paste a youtube link to request for song lyric</p>
    <input
      type="url"
      name="url"
      id="url"
      placeholder="https://youtube.com/"
      pattern="https://youtube.com/*"
      size="30"
      required
    />
    <button id="search">Search</button>
    <script>
      document.getElementById("search").addEventListener(
        "click",
        /**
         * Get title of YouTube video from noembed API
         */
        async function getTitle() {
          const url = document.getElementById("url").value;

          fetch(`https://noembed.com/embed?dataType=json&url=${url}`)
            .then((response) => response.json())
            .then((data) => {
              const title = data.title;
              console.log(title);
            });
        },
      );
    </script>
  </body>
</html>
