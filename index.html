<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" href="style.css" />
    <title>lyriclookup</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon/site.webmanifest" />
  </head>
  <body>
    <div class="content" id="content">
      <header>
        <h1>lyriclookup</h1>
        <form>
          <label for="input-type">Search song via:</label>
          <select id="input-type" onchange="toggleInputFields()">
            <option value="url">YouTube URL</option>
            <option value="release-and-artist">Release & Artist</option>
          </select>
          <div id="url-input" class="inputField">
            <label for="url">Enter URL:</label>
            <input
              type="url"
              id="url"
              placeholder="https://youtube.com/"
              value="https://www.youtube.com/watch?v=dQw4w9WgXcQ"
              pattern="^((https?:\/\/)?(www\.)?youtube\.com\/.+)|youtu\.be\/.+"
              size="30"
              required
            />
          </div>
          <div id="song-artist-name-input" class="inputField hidden">
            <label for="title-input">Enter song title:</label>
            <input
              type="text"
              id="title-input"
              placeholder="Hello"
              value="Hello"
              size="20"
              required
            />
            <label for="artist-input">artist name:</label>
            <input
              type="text"
              id="artist-input"
              placeholder="Adele"
              value="Adele"
              size="20"
              required
            />
          </div>
          <button id="search" onclick="searchSong(event)">Search</button>
        </form>
      </header>
      <div class="container">
        <div class="left-column">
          <div class="video-player-box">
            <div id="loading-video" class="loading hidden">
              Loading video...
            </div>
            <div id="loading-video-error" class="error-message hidden"></div>
            <div id="video" class="video-player" style="height: stretch"></div>
          </div>
          <div class="metadata-display-box">
            <div id="loading-metadata" class="loading hidden">
              Retrieving metadata...
            </div>
            <div id="loading-metadata-error" class="error-message hidden"></div>
            <div id="metadata" class="metadata-display"></div>
          </div>
        </div>
        <div class="lyric-display-box">
          <div id="loading-lyric" class="loading hidden">
            Searching for lyric...
          </div>
          <div id="loading-lyric-error" class="error-message hidden"></div>
          <div id="lyric" class="lyric-display"></div>
        </div>
      </div>
    </div>
    <footer>
      <p>
        Credits: Video from
        <a href="https://youtube.com">YouTube</a>; Metadata from
        <a href="https://www.discogs.com/developers/">discogs</a>; Lyrics from
        <a href="https://lrclib.net/">LRCLIB</a>.
      </p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
