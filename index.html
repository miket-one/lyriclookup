<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #131415;
        --text: #e6eef8;
        --primary: #bb44bc;
      }

      html,
      body {
        font-family: "Oswald", sans-serif;
        color: var(--text);
        height: 100%;
      }

      .bg-image {
        position: absolute;
        inset: 0;
        background-color: var(--bg);
        background-size: cover;
        background-position: center;
        filter: blur(10px) saturate(30%);
        transform: scale(1.05); /* hide edge artifacts from blur */
        will-change: transform, filter;
        z-index: -1;
      }

      .content {
        z-index: 1;
      }

      label {
        font-weight: 300;
      }

      header {
        backdrop-filter: blur(5px);
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
        padding: 20px;
      }

      .container {
        display: flex;
        flex-direction: row;
        height: 100vh;
      }

      .video-player {
        flex: 2;
        padding: 20px;
        backdrop-filter: blur(5px);
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
      }

      .metadata-display {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        backdrop-filter: blur(5px);
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
      }

      .left-column {
        display: flex;
        flex-direction: column;
        width: 60%;
      }
      .lyric-display {
        flex: 1;
        padding: 20px;
        overflow-y: scroll;
        backdrop-filter: blur(5px);
        background-color: rgba(0, 0, 0, 0.5);
        border-radius: 10px;
        font-size: x-large;
      }

      @media (max-width: 420px) {
        .container {
          flex-direction: column;
        }
      }

      .hidden {
        display: none;
      }
    </style>
    <title>lyriclookup</title>
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="favicon/site.webmanifest" />
  </head>
  <body>
    <div class="bg-image"></div>
    <div class="content">
      <header>
        <h1>lyriclookup</h1>
        <form>
          <label for="input-type">Search song via:</label>
          <select id="input-type" onchange="toggleInputFields()">
            <option value="url">YouTube URL</option>
            <option value="release-and-artist">Release & Artist</option>
          </select>
          <div id="url-input" class="inputField">
            <label for="url">Enter URL:</label>
            <input
              type="url"
              id="url"
              placeholder="https://youtube.com/"
              pattern="https://youtube.com/*"
              size="30"
              required
            />
          </div>
          <div id="song-artist-name-input" class="inputField hidden">
            <label for="title-input">Enter song title:</label>
            <input
              type="text"
              id="title-input"
              placeholder="Hello"
              size="20"
              required
            />
            <label for="artist-input">artist name:</label>
            <input
              type="text"
              id="artist-input"
              placeholder="Adele"
              size="20"
              required
            />
          </div>
          <button id="search" onclick="searchSong()">Search</button>
        </form>
      </header>
      <div class="container">
        <div class="left-column">
          <div class="video-player" id="video"></div>
          <div class="metadata-display" id="metadata"></div>
        </div>
        <div class="lyric-display" id="lyric"></div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
