<!doctype html>
<html>
  <head>
    <title>lyriclookup</title>
  </head>
  <body>
    <h1>lyriclookup</h1>
    <p>Paste a youtube link to request for song lyric</p>
    <input
      type="url"
      name="url"
      id="url"
      placeholder="https://youtube.com/"
      pattern="https://youtube.com/*"
      size="30"
      required
    />
    <button id="search" onclick="searchSong()">Search</button>
    <script>
      async function searchSong() {
        const title = await getTitle();
        getLyric(title);
      }

      /**
       * Get title of YouTube video from noembed API
       */
      async function getTitle() {
        const url = document.getElementById("url").value;

        return fetch(`https://noembed.com/embed?dataType=json&url=${url}`)
          .then((response) => response.json())
          .then((data) => data.title);
      }

      /**
       * Search LRCLIB API via song title and return lyric
       */
      function getLyric(title) {
        // Convert song title to URI
        const queryValue = encodeURIComponent(title).replace(/%20/g, "+");

        fetch(`https://lrclib.net/api/search?q=${queryValue}`)
          .then((response) => response.json())
          .then((data) => {
            const lyric = data[0].plainLyrics;
            console.log(lyric);
          });
      }
    </script>
  </body>
</html>
